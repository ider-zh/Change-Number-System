version: '3.8'

services:
  app:
    image: crpi-yl4pb9sg5y2myg6f.cn-hangzhou.personal.cr.aliyuncs.com/9992099/change_number_system:latest
    container_name: change-number-system
    restart: unless-stopped
    ports:
      - "3000:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/data/app.db
    volumes:
      - sqlite-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.lifecycle.pre-check=/app/scripts/pre-update.sh"
      - "com.centurylinklabs.watchtower.lifecycle.pre-update-timeout=30"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M

  watchtower:
    image: crpi-yl4pb9sg5y2myg6f.cn-hangzhou.personal.cr.aliyuncs.com/9992099/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --label-enable --cleanup --rolling-restart
    environment:
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_ROLLING_RESTART=true
      - WATCHTOWER_INCLUDE_RESTARTING=true
      - WATCHTOWER_LIFECYCLE_HOOKS=true
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  sqlite-data:
    driver: local
