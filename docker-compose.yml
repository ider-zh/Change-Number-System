version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: change-number-system
    restart: unless-stopped
    ports:
      - "3000:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/data/app.db
    volumes:
      - sqlite-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  sqlite-data:
    driver: local
